<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> Sign-In to your account</title>
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body>

    <a href="#">
      <img src="assets/amazon_logo.png" width="100" />
    </a>
    
    <div class="auth-container">
      <h1 class="auth-title">Sign in</h1>
      
      <p class="input-label">Email or mobile phone number</p>
      <input type="text" id="loginEmail" />
      
      <button type="button" id="loginBtn">Continue</button>
      
      <p class="auth-notice">
        By continuing, you agree to Amazon's <span>Conditions of Use</span> and <span>Privacy Notice.</span>
      </p>
      
      <p class="auth-help">&#9656; <span>Need help?</span></p>
      
      <hr>
      
      <h4>Buying for work?</h4>
      <p class="auth-bussiness"><span>Shop on Amazon Business</span></p>
    </div>
    
    <div class="auth-divider">
      <p>New to Amazon?</p>
    </div>
    
    <button class="auth-secondary-btn" onclick="window.location.href='signup.html'">Create your Amazon account</button>
    
    <footer>
      <div class="footer-links">
         <a href="#">Conditions of Use</a>
         <a href="#">Privacy Notice</a>
         <a href="#">Help</a>
      </div>
      <p class="footer-copyright">&copy; 1996-2026, Amazon.com, Inc. or its affiliates</p>
    </footer>

    <script>
      document.getElementById("loginBtn").addEventListener("click", function() {
          let email = document.getElementById("loginEmail").value.trim();
          
          if(email === "") {
              alert("Please enter your email or mobile phone number!");
          } else {
              alert("Sign-in successful!");
          }
      });
    </script>

  </body>
</html>
